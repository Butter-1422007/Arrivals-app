name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        run: |
          yes | buildozer android debug 2>&1 | tee build.log
          echo "Build done!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arrivals-apk
          path: bin/*.apk

      - name: Upload log always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
