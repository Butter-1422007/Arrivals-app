name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip wget openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libltdl-dev libffi-dev libssl-dev cmake build-essential python3-pip python3-dev
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Check files
        run: ls -la

      - name: Build APK
        run: yes | buildozer android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: arrivals-apk
          path: bin/*.apk

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: build-log
          path: build.log
