name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: arrivals-apk
          path: bin/*.apk
```

---

### Step 5 — Save it

Scroll down → Click **"Commit new file"** green button

---

### Step 6 — Upload main.py and buildozer.spec

Now click **"Add file"** → **"Upload files"** → drag and drop just these two files:
- `main.py`
- `buildozer.spec`

Click **"Commit changes"**

---

### Step 7 — Check Actions tab

Click the **Actions** tab — you should see the build starting automatically with a yellow spinner ⏳

